name: Transfer API

run:
  requests: 10000
  concurrency: 500
  timeout: 5000

request:
  method: POST
  url: http://localhost:8000/transfers

headers:
  Authorization: Bearer token
  Content-Type: application/json
  Idempotency-Key: "{{uuid}}"

body:
  sourceAccount: ACC001
  destinationAccount: ACC002
  amount: 1000
  currency: EUR

# Optional: fail if observed status code counts don't match.
# Omit this section to run without assertions.
#
# expect:
#   status_codes:
#     200: 10000
#
# Idempotency example — exactly one success, rest rejected:
# expect:
#   status_codes:
#     201: 1
#     409: 9999
